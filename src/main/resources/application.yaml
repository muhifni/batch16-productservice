spring:
  cache:
    type: redis
    redis:
      time-to-live: 10m
  data:
    redis:
      host: localhost
      port: 6380
  application:
    name: productservice
  datasource: #CONFIG POSTGRES CONNECTION
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/batch16_product_management
    username: postgres
    password: admin
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true #ngerapiin query sql di console
        show_sql: true #munculin query sql di console
server:
  port: 8082
  servlet:
    context-path: /product

kafka:
  bootstrap-servers: localhost:9092

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true